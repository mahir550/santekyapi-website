name = "santekyapi-forms-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

routes = [
  { pattern = "www.santekyapi.com.tr/api/*", zone_name = "santekyapi.com.tr" }
]

[[d1_databases]]
binding = "DB"
database_name = "santekyapi-db"
database_id = "717516d2-398f-4bf2-b125-e39136ced991"

# Lead bildirimi e-postası (Cloudflare Email Routing send_email binding)
# NOT: destination_address Email Routing'de DOĞRULANMIŞ bir destination olmalı.
[[send_email]]
name = "SEB"
destination_address = "mahir@santekyapi.com.tr"
